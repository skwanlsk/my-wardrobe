}

function useWeather(city){
  const [wx,setWx]       = useState(null);
  const [loading,setLoading] = useState(false);
  const [err,setErr]     = useState(null);
  const cache            = useRef({});

  useEffect(()=>{
    if(!city||city.trim().length<2){ setWx(null); return; }
    const key = city.trim().toLowerCase();
    if(cache.current[key]){ setWx(cache.current[key]); return; }
    setLoading(true); setErr(null);
    (async()=>{
      try{
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh&format=json`);
        const geoData = await geoRes.json();
        if(!geoData.results?.length) throw new Error("找不到城市");
        const {latitude:lat, longitude:lon, name:cityName, country} = geoData.results[0];
        const wxRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,weathercode&wind_speed_unit=kmh&timezone=auto`);
        const wxData = await wxRes.json();
        const cur = wxData.current;
        const wmo = getWMO(cur.weathercode);
        const result = {city:`${cityName}, ${country}`,temp:Math.round(cur.temperature_2m),feels:Math.round(cur.apparent_temperature),humidity:cur.relative_humidity_2m,condition:wmo.cond,icon:wmo.icon,description:wmo.label};
        cache.current[key] = result;
        setWx(result);
      } catch(e){ setErr(e.message||"天氣獲取失敗"); }
      setLoading(false);
    })();
  },[city]);
  return {wx, loading, err};
}

/* ────────────────修正後的 API CALL (適配 Evolink/OpenAI 格式)──────────────── */
async function callClaude(body){
  const res = await fetch("/api/claude",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message||data.error);
  
  // 將 OpenAI/Evolink 的結構轉換回 App 預期的結構
  if (data.choices && data.choices[0].message) {
    return {
      content: [{ type: "text", text: data.choices[0].message.content }]
    };
  }
  return data;
}

async function analyseClothing(dataUrl, mimeType){
  const b64 = dataUrl.split(",")[1];
  const data = await callClaude({
    model:"claude-sonnet-4-20250514", max_tokens:300,
    messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:mimeType,data:b64}},
      {type:"text",text:`你係時裝助手。分析呢張衣物相片。
回覆 ONLY 一個 JSON object，唔好任何其他文字或 markdown：
{"name":"<廣東話衣物名稱，例如：白色棉質上衣>","category":"<只能係：上衣|褲/裙|外套|鞋|配件 其中一個>","occasions":["<從以下選1-3個：返工|見客|約會|度假|郊遊|Party|日常|運動>"],"emoji":"<單一最適合emoji>"}`},
    ]}],
  });
  
  const txt = data.content?.find(b=>b.type==="text")?.text||"{}";
  // 修正：使用 Regex 抽取出真正的 JSON 部分，防止報錯
  const jsonMatch = txt.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error("AI 回傳格式不符");
  return JSON.parse(jsonMatch[0]);
}

  const curLoc = dateLocations[selDate]||locInput||"London";
  const {wx,loading:wxLoad,err:wxErr} = useWeather(curLoc);
  const filtered = wardrobe
    .filter(i=>catFilter==="全部"||i.category===catFilter)
    .filter(i=>occFilter==="全部"||(i.occasions||[]).includes(occFilter));

  const yr=calMonth.getFullYear(), mo=calMonth.getMonth();
  const dim=new Date(yr,mo+1,0).getDate();
  const fdow=new Date(yr,mo,1).getDay();
  const mLabel=calMonth.toLocaleString("zh-HK",{year:"numeric",month:"long"});
  const dk=d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const selEntry=calData[selDate];

  const toggleOutfit = item => setOutfit(p=>p.find(i=>i.id===item.id)?p.filter(i=>i.id!==item.id):[...p,item]);
  const updateLoc    = loc  => { setLocInput(loc); setDateLocs(p=>({...p,[selDate]:loc})); };

  const saveToCalendar = () => {
    if(!outfit.length) return;
    setCalData(p=>({...p,[selDate]:{...p[selDate],location:curLoc,outfitIds:outfit.map(i=>i.id),label:event||"我的 Outfit"}}));
    setAiSug("");
  };

  const getAI = async() => {
    setAiLoad(true); setAiSug("");
    const list = wardrobe.map(i=>`${i.name}(${i.category})`).join(", ");
    const w = wx?`${wx.temp}°C，${wx.description}，體感${wx.feels}°C`:"天氣未知";
    try{
      const data = await callClaude({
        model:"claude-sonnet-4-20250514", max_tokens:300,
        messages:[{role:"user",content:
          `你係高端時尚造型師，用廣東話回答。衣櫃：${list}。天氣(${curLoc})：${w}。活動：${event||"日常外出"}。建議一套具體outfit（列衣物名），一句說明搭配原因。100字內。`
        }],

    const file=e.target.files[0]; if(!file) return;

            </Card>

            <Card style={{borderColor:T.accentL,background:T.accentBg}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:12,color:T.accent,fontWeight:500}}>✦ AI 造型師</div>
                <Btn variant="sm" onClick={getAI} disabled={aiLoad}>{aiLoad?<span className="mspin">⟳</span>:"獲取建議"}</Btn>
              </div>
              {aiSug ? <div style={{fontSize:13,lineHeight:1.75}}>{aiSug}</div> : <div style={{fontSize:12,color:T.textL}}>獲取個性化穿搭建議</div>}
            </Card>

            <div>
              <FL>衣物選取</FL>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginTop:8}}>
                {filtered.map(item=><ClothingRow key={item.id} item={item} selected={!!outfit.find(i=>i.id===item.id)} onToggle={toggleOutfit}/>)}
              </div>
            </div>

            {outfit.length>0&&(
              <Card style={{borderColor:T.accent}}>
                <Btn onClick={saveToCalendar} style={{width:"100%"}}>📅 儲存到日曆</Btn>
              </Card>
            )}
          </div>
        )}

        {/* WARDROBE TAB */}
        {tab==="wardrobe"&&(
          <div className="mfade">
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <span style={{fontSize:13}}>{wardrobe.length} 件衣物</span>
              <Btn variant="sm" onClick={()=>setAddMode(!addMode)}>+ 新增</Btn>
            </div>
            {addMode&&(
              <Card style={{marginBottom:14,borderColor:T.accentL}}>
                <div onClick={()=>!uploading&&fileRef.current.click()} style={{border:`2px dashed ${T.accentL}`,borderRadius:10,padding:"18px",textAlign:"center",background:T.accentBg,cursor:"pointer"}}>
                  {uploading ? <span className="mspin">⟳</span> : "📷 上載衣物相片 (AI 識別)"}
                </div>
                <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleWardrobeUpload}/>
                <Inp value={newName} placeholder="手動名稱" onChange={e=>setNewName(e.target.value)} style={{marginTop:10}}/>
                <Btn onClick={addManual} style={{width:"100%",marginTop:10}}>確認新增</Btn>
              </Card>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {filtered.map(item=>(
                <div key={item.id} style={{borderRadius:12,border:`1px solid ${T.border}`,background:T.white,padding:8,position:"relative"}}>
                  {item.img && <img src={item.img} style={{width:"100%",height:100,objectFit:"contain"}}/>}
                  <div style={{fontSize:12,fontWeight:500,marginTop:5}}>{item.name}</div>
                  <button onClick={()=>setWardrobe(p=>p.filter(i=>i.id!==item.id))} style={{position:"absolute",top:5,right:5,background:"#fff",border:"none",borderRadius:10,width:20,height:20,fontSize:10}}>✕</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* CALENDAR TAB */}
        {tab==="calendar"&&(
          <div className="mfade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <button onClick={()=>setCalMonth(m=>new Date(m.getFullYear(),m.getMonth()-1))}>‹</button>
              <span style={{fontFamily:T.serif,fontSize:20}}>{mLabel}</span>
              <button onClick={()=>setCalMonth(m=>new Date(m.getFullYear(),m.getMonth()+1))}>›</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {Array.from({length:dim},(_,i)=>i+1).map(d=>{
                const k=dk(d);
                return <div key={k} onClick={()=>setSelDate(k)} style={{aspectRatio:1,display:"flex",alignItems:"center",justifyContent:"center",background:k===selDate?T.accent:T.white,color:k===selDate?T.white:T.text,borderRadius:8}}>{d}</div>
              })}
            </div>
          </div>
        )}

        {/* JOURNAL TAB */}
        {tab==="journal"&&(
          <div className="mfade">
            <Card>
              <FL>上載今日穿搭照</FL>
              <Btn onClick={()=>journalRef.current.click()} style={{width:"100%"}}>選擇相片</Btn>
              <input ref={journalRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleJournalUpload}/>
            </Card>
            {Object.entries(calData).map(([date,entry])=>entry.journalImg&&(
              <Card key={date} style={{marginTop:10}}>
                <FL>{date}</FL>
                <img src={entry.journalImg} style={{width:"100%",borderRadius:10}}/>
              </Card>
            ))}
          </div>
        )}
      </div>

      <div style={{flexShrink:0,background:"#f5f0e8",padding:10,textAlign:"center",fontSize:10}}>
        💾 所有資料儲存在本地裝置
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
